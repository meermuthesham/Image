<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Creative Image Gallery</h2>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="architecture">Architecture</button>
            <button class="filter-btn" data-filter="animals">Animals</button>
        </div>

        <div class="gallery" id="gallery">
            <div class="gallery-item" data-category="nature">
                <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80" alt="Nature Forest">
            </div>
            <div class="gallery-item" data-category="architecture">
                <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=800&q=80" alt="Architecture Skyscraper">
            </div>
            <div class="gallery-item" data-category="animals">
                <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=800&q=80" alt="Animal Lion">
            </div>
            <div class="gallery-item" data-category="nature">
                <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=800&q=80" alt="Nature Landscape">
            </div>
            <div class="gallery-item" data-category="architecture">
                <img src="https://images.unsplash.com/photo-1428366890462-dd4baecf492b?w=800&q=80" alt="Architecture Bridge">
            </div>
            <div class="gallery-item" data-category="animals">
                <img src="https://images.unsplash.com/photo-1474511320723-9a56873867b5?w=800&q=80" alt="Animal Fox">
            </div>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <span class="close-btn" id="close-btn">&times;</span>
        <button class="nav-btn prev-btn" id="prev-btn">&#10094;</button>
        <img src="" alt="Lightbox Image" class="lightbox-img" id="lightbox-img">
        <button class="nav-btn next-btn" id="next-btn">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
